<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kong Concentrates - Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;
  --off-white:#f0ead8;
  --gold:#c9a84c;
  --gold2:#e8c46a;
  --dark:#141414;
  --border:rgba(201,168,76,0.15);
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--black);font-family:'Barlow Condensed',sans-serif;color:var(--off-white);min-height:100vh;}

/* ━━ INTRO ━━ */
#intro{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 0.8s ease,transform 0.8s ease;}
#intro.hide{opacity:0;transform:scale(1.02);pointer-events:none;visibility:hidden}
.logo-wrap{position:relative;width:min(220px,60vw);opacity:0;transform:scale(0.85);animation:logoIn 1.1s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;}
.logo-wrap img{width:100%;border-radius:50%;display:block;filter:drop-shadow(0 0 60px rgba(201,168,76,0.45));}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,0.25);animation:pulse 2.4s ease-in-out infinite alternate;pointer-events:none;}
.ring1{inset:-16px;animation-delay:0s}
.ring2{inset:-32px;animation-delay:0.5s;border-color:rgba(201,168,76,0.1)}
.ring3{inset:-52px;animation-delay:0.9s;border-color:rgba(201,168,76,0.05)}
.intro-tagline{margin-top:32px;font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,42px);letter-spacing:0.15em;color:var(--off-white);opacity:0;animation:fadeUp 0.7s ease 1.2s forwards;text-align:center;}
.intro-sub{margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);opacity:0;animation:fadeUp 0.7s ease 1.5s forwards;text-align:center;}

@keyframes logoIn{to{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{from{opacity:0.2;transform:scale(1)}to{opacity:0.7;transform:scale(1.015)}}

/* ━━ SITE ━━ */
#site{display:none;flex-direction:column;min-height:100vh}
#site.show{display:flex}

/* header */
header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:12px 28px;flex-wrap:wrap;}
.hlogo{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(201,168,76,0.3);}
.htext h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;line-height:1;}
.htext p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.25em;color:var(--gold);text-transform:uppercase;margin-top:3px;}
.hnav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.hnav a{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,234,216,0.55);text-decoration:none;padding:8px 14px;border:1px solid #242424;transition:all 0.2s;}
.hnav a:hover,.hnav a.active{color:var(--gold);border-color:rgba(201,168,76,0.4);}
.hnav-ig{display:flex;align-items:center;justify-content:center;padding:8px 10px;}


/* ━━ MENU IMAGE ━━ */
.menu-image-wrap{
  display:flex;justify-content:center;
  padding:48px 24px 64px;
}
.menu-img{
  max-width:800px;
  width:100%;
  display:block;
  border:1px solid var(--border);
}

/* footer */
footer{margin-top:auto;border-top:1px solid #181818;padding:28px 40px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;}
footer p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:rgba(240,234,216,0.25);text-align:center;}
footer a{color:rgba(240,234,216,0.4);text-decoration:none;transition:color 0.2s;}
footer a:hover{color:var(--gold);}

/* responsive */
@media(max-width:620px){
  .hnav .hide-mobile{display:none}
  .hnav{gap:6px;}
  .hnav a{padding:7px 10px;font-size:10px;letter-spacing:0.1em;}
  header{padding:10px 16px;gap:10px;}
  .filter-bar{padding:24px 20px 0;}
  .products-section{padding:32px 20px 60px;}
  .page-header{padding:48px 24px 36px;}
  footer{padding:24px 20px;}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="logo-wrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <img src="../images/MAIN-ROUND-1.png" alt="Kong Concentrates">
  </div>
  <div class="intro-tagline">Kong Concentrates</div>
  <div class="intro-sub">Current Menu</div>
</div>

<!-- SITE -->
<div id="site">

  <header>
    <a href="/" style="display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;">
      <img src="../images/MAIN-ROUND-1.png" alt="Logo" class="hlogo">
      <div class="htext">
        <h1>Kong Concentrates</h1>
        <p>Grove, Oklahoma</p>
      </div>
    </a>
    <nav class="hnav">
      <a href="/menu" class="active">Menu</a>
      <a href="/coa">Lab Results</a>
      <a href="/locations">Locations</a>
      <a href="/contact">Contact</a>
      <a href="https://instagram.com/kongconcentrates" target="_blank" rel="noopener" class="hnav-ig" title="Instagram" aria-label="Instagram"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:block"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
    </nav>
  </header>

  <!-- MENU IMAGE -->
  <div class="menu-image-wrap">
    <img src="../images/KONG Concentrate Product Menu 2.jpg" alt="Kong Concentrates Menu" class="menu-img">
  </div>

  <footer>
    <p>&copy; 2025 Kong Concentrates &nbsp;&middot;&nbsp; <a href="/">Home</a> &nbsp;&middot;&nbsp; <a href="/coa">Lab Results</a> &nbsp;&middot;&nbsp; <a href="mailto:process@kongconcentrates.com">process@kongconcentrates.com</a></p>
  </footer>

</div><!-- /#site -->

<script>
setTimeout(()=>enterSite(), 2500);
function enterSite(){
  document.getElementById('intro').classList.add('hide');
  const site = document.getElementById('site');
  site.classList.add('show');
  setTimeout(()=>{ site.style.opacity='1'; },50);
}

</script>
</body>
</html>
