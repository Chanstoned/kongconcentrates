[build]
  publish = "Website"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "WHOLESALE_ADMIN_EMAIL"

[functions]
  node_bundler = "nft"

[functions."wholesale-place-order"]
  timeout = 26

# Blog post clean URLs: /blog/my-post → /blog/post/?slug=my-post
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/post/?slug=:slug"
  status = 200
